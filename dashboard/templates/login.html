<!DOCTYPE html>

<html>

<head>

<title>
Bethel Trading Technologies Login
</title>


<style>

body {

    font-family: Arial, sans-serif;
    background: #f4f7fa;
    text-align: center;
    padding-top: 100px;

}


.login-box {

    background: white;
    width: 350px;
    margin: auto;
    padding: 30px;
    border-radius: 10px;

}


input {

    width: 90%;
    padding: 12px;
    margin: 10px;

}


button {

    padding: 12px 40px;
    cursor: pointer;

}


</style>


</head>


<body>


<div class="login-box">


<h1>
Bethel Trading Technologies
</h1>


<h3>
Admin Login
</h3>


<form action="/login" method="post">


<input
type="text"
name="username"
placeholder="Username"
required>


<br>


<input
type="password"
name="password"
placeholder="Password"
required>


<br>


<button type="submit">
Login
</button>


</form>


</div>


</body>


</html>
